<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry Received! | Connect More</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            color: #333333; 
            margin: 0; 
            background-color: #3B60E4; /* Royal Blue Background */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .success-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: 20px;
        }
        i { color: #FFF275; font-size: 4em; margin-bottom: 20px; }
        h1 { color: #3B60E4; margin-top: 0; }
        p { font-size: 1.1em; color: #666; }
        .btn { 
            background: #3B60E4; 
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            font-weight: 700; 
            border-radius: 50px; 
            display: inline-block;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="success-card">
        <i class="fas fa-check-circle"></i>
        <h1>Got It!</h1>
        <p>Thanks for reaching out, Jake and Kate will get back to you soon about your event.</p>
        <a href="index.html" class="btn">BACK TO HOME</a>
    </div>
</body>
</html>
