<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library | Connect More</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html"><img class="piccenter" src="logo.png" alt="Connect More Logo"></a>
    <div class="hero-text">GAME LIBRARY</div>
    <div class="tagline">44 WAYS TO UNPLUG</div>
    <div class="nav-container">
        <a href="index.html" class="btn btn-secondary">BACK TO HOME</a>
    </div>
</header>

<div class="search-section">
    <input type="text" id="gameSearch" placeholder="Search by name or keyword...">
    
    <div class="filter-master-container">
        <div class="filter-group">
            <h4>PLAYERS</h4>
            <div class="filter-buttons" data-group="players">
                <button class="filter-btn" data-filter="2">2 Players</button>
                <button class="filter-btn" data-filter="3">3 Players</button>
                <button class="filter-btn" data-filter="4">4 Players</button>
                <button class="filter-btn" data-filter="5+">5+ Players</button>
            </div>
        </div>
        <div class="filter-group">
            <h4>TYPE</h4>
            <div class="filter-buttons" data-group="category">
                <button class="filter-btn" data-filter="Strategy">Strategy</button>
                <button class="filter-btn" data-filter="Party">Party</button>
                <button class="filter-btn" data-filter="Classic">Classic</button>
                <button class="filter-btn" data-filter="Kids">Kids</button>
            </div>
        </div>
        <div class="filter-group">
            <h4>DIFFICULTY</h4>
            <div class="filter-buttons" data-group="complexity">
                <button class="filter-btn" data-filter="Easy">Easy</button>
                <button class="filter-btn" data-filter="Intermediate">Intermediate</button>
                <button class="filter-btn" data-filter="Advanced">Advanced</button>
            </div>
        </div>
        <button id="clearFilters" class="clear-btn">CLEAR ALL FIELDS</button>
    </div>
</div>

<div class="container">
    <div id="gameGrid">
        <div class="game-card" data-category="Strategy" data-players="2-4" data-complexity="Intermediate">
            <div class="game-header">
                <div class="game-info-top"><span class="badge">Strategy</span><span class="badge">2-4 Players</span><span class="badge">Intermediate</span></div>
                <div class="game-title-row"><h2>Catan</h2><i class="fas fa-chevron-down arrow"></i></div>
            </div>
            <div class="game-content"><p>Trade resources to build settlements on the island of Catan.</p></div>
        </div>
        </div>
</div>

<script src="script.js"></script>
</body>
</html>
